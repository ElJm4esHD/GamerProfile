server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cumple el mismo rol que el proxy de Vite en desarrollo: el frontend pide
    # "/api" y esto lo reenvía al backend por la red interna de compose. Así el
    # backend no necesita publicar ningún puerto al host.
    location /api/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Las recomendaciones de Gemini pueden tardar bastante más que una
        # consulta normal. El default de 60s las cortaría a mitad de camino.
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    # SPA: react-router maneja las rutas del lado del cliente, así que
    # cualquier path que no sea un archivo real devuelve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # El bundle de Vite lleva hash en el nombre: se puede cachear agresivo.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
